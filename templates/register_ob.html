{% extends "base.html" %}
{% block content %}
<div class="bg-[#1e293b] border border-[#334155] p-6 rounded-lg max-w-4xl mx-auto">
    <!-- Section Identity Header Banner -->
    <div class="flex justify-between items-center mb-6 border-b border-[#334155] pb-3">
        <div>
            <h2 class="text-xl font-bold text-white uppercase tracking-wide font-mono">Execute Incident Logging Process</h2>
            <p class="text-xs text-slate-400 font-mono mt-0.5">National Police Service — Digitized Statement Intake Ledger</p>
        </div>
        <span class="text-xs font-mono bg-[#2ec4b6]/10 border border-[#2ec4b6] text-[#2ec4b6] px-3 py-1 rounded font-bold">Intake Phase Vector</span>
    </div>

    <!-- Legal Form Entry Matrix Panel -->
    <form action="{{ url_for('register_ob') }}" method="POST" class="space-y-5 font-mono text-xs">
        
        <!-- Input Grid Field Unit: Complainant Legal Identity Profile -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">Complainant Full Legal Name</label>
                <input type="text" name="complainant_name" required 
                       class="w-full bg-[#0f172a] border border-[#334155] text-white p-3 rounded focus:border-[#2ec4b6] outline-none tracking-wide text-xs">
            </div>
            <div>
                <label class="block text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">National ID / Contact Phone Token</label>
                <input type="text" name="complainant_phone" required 
                       class="w-full bg-[#0f172a] border border-[#334155] text-white p-3 rounded focus:border-[#2ec4b6] outline-none tracking-wide text-xs"
                       placeholder="e.g. +254 700 000000">
            </div>
        </div>

        <!-- Input Field Unit: Offence Penal Code Matrix Classification -->
        <div>
            <label class="block text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">Crime Category Classification Metric</label>
            <input type="text" name="nature_of_offence" required 
                   class="w-full bg-[#0f172a] border border-[#334155] text-white p-3 rounded focus:border-[#2ec4b6] outline-none tracking-wide text-xs" 
                   placeholder="e.g. Assault, Burglary, Narcotics Possession, Traffic Violation">
        </div>

        <!-- Block Field Unit: Primary Transcript Deposition -->
        <div>
            <label class="block text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">Statement Narrative Descriptive Details</label>
            <textarea name="details" required rows="6" 
                      class="w-full bg-[#0f172a] border border-[#334155] text-white p-3 rounded focus:border-[#2ec4b6] outline-none tracking-wide text-xs leading-relaxed"
                      placeholder="Input chronological transcript tracking log parameters regarding the reported incident..."></textarea>
        </div>

        <!-- Form Dispatch Command Trigger Partition -->
        <div class="pt-4 border-t border-[#334155]/60 flex justify-end">
            <button type="submit" 
                    class="w-full bg-[#1e293b] border border-[#2ec4b6] text-white text-xs font-bold p-3.5 rounded uppercase tracking-widest hover:bg-[#2ec4b6] hover:text-black transition duration-200">
                Commit Record Entry Block onto Station Ledger
            </button>
        </div>
    </form>
</div>
{% endblock %}
