<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NPS - Log New Occurrence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0B192C; color: #FFFFFF; }
        .form-card { background-color: #1E2A38; border-radius: 8px; padding: 25px; border: 1px solid #00D2C4; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-card">
                    <h4 class="mb-3">Official Occurrence Book (OB) Entry Logging Form</h4>
                    <p class="text-muted small">Ensure accuracy. Entries committed here generate standard legal records immediately.</p>
                    <hr class="border-secondary">
                    <form action="/ob/register" method="POST">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label small">Complainant / Reporter Full Name</label>
                                <input type="text" name="complainant_name" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small">Contact Mobile Number</label>
                                <input type="text" name="complainant_phone" class="form-control bg-dark text-white border-secondary" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Nature of Offence / Incident Type</label>
                            <input type="text" name="nature_of_offence" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Assault, Burglary, Missing Person" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small">Detailed Statement / Fact Narrative</label>
                            <textarea name="details" class="form-control bg-dark text-white border-secondary" rows="5" required></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="/dashboard" class="btn btn-outline-secondary text-white">Cancel & Return</a>
                            <button type="submit" class="btn btn-success px-4 text-white">Commit Log Entry</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
