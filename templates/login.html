<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPS Digital OB - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0B192C; color: #FFFFFF; font-family: 'Segoe UI', sans-serif; }
        .login-card { background-color: #1E2A38; border: 1px solid #00D2C4; border-radius: 8px; padding: 30px; margin-top: 100px; }
        .btn-custom { background-color: #00D2C4; color: #0B192C; font-weight: bold; }
        .btn-custom:hover { background-color: #00B3A6; color: #0B192C; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card shadow-lg text-center">
                    <h3 class="mb-2">NATIONAL POLICE SERVICE</h3>
                    <h5 class="text-muted mb-4">Digital Occurrence Book & Case Management</h5>
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category if category != 'error' else 'danger' }} text-start small py-2">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form action="/login" method="POST" class="text-start">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Personnel Service Number</label>
                            <input type="text" name="service_number" class="form-control bg-dark text-white border-secondary" placeholder="e.g. NPS/ADMIN/2026" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Secure Access Key</label>
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 text-white">Authenticate & Enter</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
