{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-160px)] font-mono">
    
    <div class="bg-[#1e293b] border border-[#334155] p-8 rounded-lg w-full max-w-2xl shadow-xl space-y-6">
        
        <div class="text-center border-b border-[#334155] pb-4">
            <h2 class="text-lg font-bold text-white uppercase tracking-wider flex items-center justify-center space-x-2">
                <span>📥</span> <span>Statistical Data Extraction Pipeline</span>
            </h2>
            <p class="text-xs text-slate-400 mt-2 max-w-md mx-auto leading-relaxed">
                Extract complete data boundaries from the active core ledger node. Outputs generate structured files containing cryptographic compliance signatures.
            </p>
        </div>

        <form action="{{ url_for('reports') }}" method="POST" class="space-y-5 text-xs">
            
            <div>
                <label class="block text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">
                    Reporting Extraction Framework Target
                </label>
                <select name="report_type" required
                        class="w-full bg-white text-black font-bold border border-[#334155] p-3 rounded outline-none focus:ring-2 focus:ring-[#2ec4b6]">
                    <option value="daily" class="bg-white text-black font-bold">Daily Primary OB Analytical Trace Logs</option>
                    <option value="monthly" class="bg-white text-black font-bold">Monthly Crime Rate Vector Matrix</option>
                    <option value="personnel" class="bg-white text-black font-bold">Station Personnel Audit History Ledger</option>
                </select>
            </div>

            <div>
                <label class="block text-[11px] text-slate-400 font-bold uppercase tracking-wider mb-2">
                    Document Container Output Format
                </label>
                <select name="export_format" required
                        class="w-full bg-white text-black font-bold border border-[#334155] p-3 rounded outline-none focus:ring-2 focus:ring-[#2ec4b6]">
                    <option value="xlsx" class="bg-white text-black font-bold">Microsoft Excel Binary Spreadsheet (.XLSX)</option>
                    <option value="pdf" class="bg-white text-black font-bold">Portable Document Format Abstract (.PDF)</option>
                </select>
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full bg-[#1e293b] border border-[#2ec4b6] text-white text-xs font-bold p-3.5 rounded uppercase tracking-widest hover:bg-[#2ec4b6] hover:text-black transition duration-150 shadow-md">
                    Actuate Compilation Extraction Core
                </button>
            </div>
            
        </form>
    </div>
</div>
{% endblock %}
